<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            width: 800px;
            height: 600px;
            background: #f5f5f5;
            overflow: hidden;
        }
        .container {
            display: flex;
            height: 100%;
        }
        .panel {
            flex: 1;
            padding: 16px;
            overflow-y: auto;
        }
        .input-panel {
            background: #fff;
            border-right: 1px solid #e0e0e0;
        }
        .output-panel {
            background: #fafafa;
        }
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 12px;
        }
        .panel-title {
            font-size: 14px;
            font-weight: 600;
            color: #333;
        }
        .btn {
            padding: 6px 12px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }
        .btn-primary {
            background: #07c160;
            color: #fff;
        }
        .btn-primary:hover {
            background: #06ad56;
        }
        .btn-secondary {
            background: #e8e8e8;
            color: #666;
        }
        .btn-secondary:hover {
            background: #ddd;
        }
        textarea {
            width: 100%;
            height: calc(100% - 50px);
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            padding: 12px;
            font-size: 13px;
            font-family: 'Consolas', 'Monaco', monospace;
            resize: none;
            line-height: 1.6;
        }
        textarea:focus {
            outline: none;
            border-color: #07c160;
        }
        #preview {
            height: calc(100% - 50px);
            overflow-y: auto;
            padding: 16px;
            background: #fff;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
        }
        #preview h1 {
            font-size: 24px;
            font-weight: bold;
            text-align: center;
            color: #333;
            margin-bottom: 20px;
        }
        #preview h2 {
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            color: #333;
            margin: 20px 0 14px;
        }
        #preview h3 {
            font-size: 18px;
            font-weight: bold;
            color: #333;
            margin: 16px 0 10px;
        }
        #preview p {
            font-size: 16px;
            line-height: 1.8;
            color: #444;
            margin-bottom: 14px;
        }
        #preview blockquote {
            margin: 14px 0;
            padding: 10px 16px;
            border-left: 4px solid #07c160;
            background: #f8f9fa;
            font-style: italic;
            color: #555;
        }
        #preview pre, #preview code {
            font-family: 'Consolas', 'Monaco', monospace;
            background: #f6f8fa;
            border-radius: 4px;
        }
        #preview pre {
            padding: 14px;
            margin: 14px 0;
            overflow-x: auto;
            font-size: 13px;
        }
        #preview code {
            padding: 2px 5px;
            font-size: 14px;
        }
        #preview hr {
            margin: 24px auto;
            text-align: center;
            border: none;
            color: #ccc;
            font-size: 18px;
            letter-spacing: 6px;
        }
        #preview hr:after {
            content: '•••';
        }
        #preview ul, #preview ol {
            font-size: 16px;
            line-height: 1.8;
            color: #444;
            margin: 14px 0;
            padding-left: 28px;
        }
        #preview li {
            margin-bottom: 6px;
        }
        #preview strong {
            font-weight: bold;
            color: #333;
        }
        #preview a {
            color: #07c160;
        }
        .notification {
            position: fixed;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            padding: 10px 20px;
            background: #07c160;
            color: #fff;
            border-radius: 4px;
            font-size: 13px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 100;
        }
        .notification.show {
            opacity: 1;
        }
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }
        .tab {
            padding: 6px 14px;
            border: 1px solid #e0e0e0;
            border-radius: 4px;
            background: #fff;
            cursor: pointer;
            font-size: 13px;
            color: #666;
        }
        .tab.active {
            background: #07c160;
            color: #fff;
            border-color: #07c160;
        }
        .tab-content {
            display: none;
        }
        .tab-content.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="panel input-panel">
            <div class="panel-header">
                <span class="panel-title">📝 输入</span>
                <button class="btn btn-secondary" id="clearBtn">清空</button>
            </div>
            <textarea id="input" placeholder="粘贴内容，支持 Markdown 语法...

# 标题
**粗体** *斜体*
`代码`
> 引用
- 列表"></textarea>
        </div>
        <div class="panel output-panel">
            <div class="panel-header">
                <span class="panel-title">📖 预览</span>
                <button class="btn btn-primary" id="copyBtn">📋 复制</button>
            </div>
            <div id="preview">
                <p style="color: #999; text-align: center; margin-top: 80px;">输入内容 → 预览效果</p>
            </div>
        </div>
    </div>
    <div class="notification" id="notification">已复制！</div>

    <script src="popup.js"></script>
</body>
</html>
